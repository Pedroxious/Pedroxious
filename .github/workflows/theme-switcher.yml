name: Theme Switcher (Warm/Cool Palette)

on:
  schedule:
    - cron: "0 11 * * *"  # 11:00 UTC = 08:00 Brasília -> paleta QUENTE
    - cron: "0 21 * * *"  # 21:00 UTC = 18:00 Brasília -> paleta FRIA
  workflow_dispatch:

jobs:
  switch-theme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply WARM palette (day)
        if: github.event.schedule == '0 11 * * *'
        run: |
          sed -i 's/BB86FC/E8863C/g' README.md
          sed -i 's/color_snake=%23a855f7/color_snake=%23c2410c/g' .github/workflows/snake.yml
          sed -i 's/color_dots=%230d1117,%232e1065,%235b21b6,%237c3aed,%23a855f7/color_dots=%230d1117,%232b140a,%236b2f10,%23b8501e,%23e8863c/g' .github/workflows/snake.yml

      - name: Apply COOL palette (night)
        if: github.event.schedule == '0 21 * * *'
        run: |
          sed -i 's/E8863C/BB86FC/g' README.md
          sed -i 's/color_snake=%23c2410c/color_snake=%23a855f7/g' .github/workflows/snake.yml
          sed -i 's/color_dots=%230d1117,%232b140a,%236b2f10,%23b8501e,%23e8863c/color_dots=%230d1117,%232e1065,%235b21b6,%237c3aed,%23a855f7/g' .github/workflows/snake.yml

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md .github/workflows/snake.yml
          git diff --cached --quiet || git commit -m "🎨 Auto theme switch"
          git push

      - name: Trigger snake workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/snake.yml/dispatches \
            -d '{"ref":"main"}'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
